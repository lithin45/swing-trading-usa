# =====================================================================
# swing-signals configuration  (tunable params only — NO secrets here)
# Secrets live in .env (gitignored). Validated by swing_signals/config_loader.py
# on startup; a bad value fails fast with a clear error rather than producing
# garbage signals. Edit weights/params here, never in code.
# =====================================================================

account:
  equity: 100000.0         # matches the live Alpaca paper account; the broker also sizes off
                           # LIVE equity at order time — see broker.size_from_live_equity
  risk_pct: 0.01           # per-trade risk, fraction of equity (1% default)
  risk_pct_ceiling: 0.02   # hard ceiling — sizing may never exceed this
  fractional_shares: true  # engine sizes fractionally; whole-share brackets floor at submit
  broker_min_order_usd: 1.0

watchlist:
  source: universe_screen  # static | universe_screen (S&P 500 + themes + news movers)
  # Fallback list used when source=static, or if the screen errors on a given day.
  # All should clear the liquidity floor under `universe` below.
  symbols: [AAPL, MSFT, NVDA, AMZN, GOOGL, META, AVGO, JPM, XOM, UNH]

# Per-stock composite factors. Momentum/relative-strength is the core, research-
# backed edge (the most-replicated anomaly in finance); technical confirms trend,
# news adds catalyst context, setup adds low-weight breakout/pullback confirmation.
# Disable a factor with enabled:false or weight:0. The engine normalizes by the sum
# of ACTIVE+AVAILABLE weights (an unavailable factor — e.g. news with no key — is
# excluded, not treated as neutral), so they need not sum to 1.
factors:
  momentum:       {enabled: true, weight: 0.45}   # f08 — relative strength / 52w-high / 12-1 (core edge)
  technical:      {enabled: true, weight: 0.25}   # f01 — trend/momentum confirmation
  news_sentiment: {enabled: true, weight: 0.0}    # f02 — Claude-scored catalyst/sentiment.
                                                  # Weight 0.0 (2026-06-12): inert in every backtest
                                                  # (SymbolData.news=None), so every validated number
                                                  # excludes it — a live weight would make the paper
                                                  # account trade an unvalidated composite. Scores are
                                                  # still computed + persisted as research data.
  setup:          {enabled: true, weight: 0.10}   # f09 — breakout/pullback confirmation (added Phase 2)
  # events (f03) / themes_cycles (f05) / smart_money (f06) remain unimplemented and
  # are intentionally omitted (they would only ever be excluded as FACTORS_PENDING).

scoring:
  composite_min: 70.0      # minimum conviction (0-100) to emit a signal (raised for selectivity)
  max_extension_atr: 3.0   # don't-chase gate: veto entries >3 ATR above the 20-EMA
                           # (2026-06 experiments: chasing extension bled expectancy)
  agreement_min: 0.70      # confluence: fraction of weighted factors agreeing (raised)
  tier_high: 80.0          # conviction tiers → position-size multiplier
  tier_medium: 70.0
  tier_low: 60.0

# File 04 — market-level macro risk-on/off modifier (scales position size).
macro:
  enabled: true
  risk_on_threshold: 55.0  # composite >= this → full size bias
  risk_off_threshold: 35.0 # composite <= this → cut size / stand aside

# File 07 — master market-regime gate (HARD override).
regime:
  enabled: true
  spy_ma_days: 200
  require_spy_above_ma: true        # no new longs if SPY below its 200-DMA
  vix_max: 28.0                     # veto/throttle above this VIX
  vix_backwardation_veto: true      # VIX/VIX3M > 1.0 → force one band lower
  green_only_entries: true          # open new longs ONLY in a GREEN regime (high-conviction selectivity)

# File 08 — hard risk & sizing constraints (all percentages of current equity).
risk:
  atr_period: 14
  atr_stop_multiple: 3.0            # initial stop = entry - 3*ATR. Widened from 2.0
                                    # (2026-06 experiments: 2-ATR stops sat inside the daily
                                    # noise of fresh momentum entries — 48% of trades died
                                    # <10 bars at ~-0.9R; same $ risk, fewer noise deaths)
  chandelier_lookback: 22           # trailing-stop lookback (~1 month)
  chandelier_multiple: 3.0
  rr_target: 2.0                    # reward:risk target (2R)
  max_positions: 8                  # concurrent positions (raised for the ~$100k paper account)
  portfolio_heat_cap: 0.10          # total open risk ceiling (10%)
  max_per_sector: 2                 # sector concentration is a COUNT cap (engine); the old
                                    # sector_heat_cap key was read by nothing and was removed
                                    # 2026-06-12 rather than advertise a control that didn't exist

  daily_loss_halt: 0.03             # halt new entries at -3% day
  weekly_loss_halt: 0.06
  monthly_loss_halt: 0.10
  drawdown_derisk: 0.10             # cut risk 50% when -10% from peak
  drawdown_hard_halt: 0.15          # full halt + review at -15%
  # Non-absorbing drawdown brake (2026-06-11). The original hard halt froze the
  # account forever (no entries -> equity flat -> drawdown never recovers): the
  # 2017-19 replay spent 306/752 days dead and missed all of 2019. The brake
  # keeps -15% as the halt line but (a) measures drawdown vs a TRAILING 1-year
  # high-water mark so an ancient peak can't anchor the halt forever, and
  # (b) after 10 consecutive halted sessions re-opens entries at 25% size —
  # the "review pause", then earn the size back through the derisk band.
  drawdown_peak_lookback: 252       # trading days; 0 = all-time peak (old behavior)
  halt_resume_days: 10              # consecutive halted sessions before resuming
  halt_resume_risk_mult: 0.25       # resumed-entry size until drawdown < derisk band
  # Concentration caps: risk-at-stop sizing gives the LARGEST dollar position to the
  # LOWEST-vol names (1% risk / 2% stop = 50% of equity!) — bound the gap risk a stop
  # can't contain. Gross cap 1.0 = entries never lever the account (Alpaca grants 2x).
  max_position_notional_pct: 0.20   # one position <= 20% of equity
  max_gross_exposure: 1.0           # sum of open notionals <= 100% of equity

# Exit state machine (swing_signals/exits.py). mode=legacy is the VALIDATED mode:
# fixed ATR stop, full exit at the 2R target, hard 20-bar time-stop — no trailing.
# mode=staged (partial at target, chandelier trail, stagnation cut) is retained for
# experimentation only: it lost to legacy in the ledgered trials TWICE (2026-06-10
# broad-universe, 2026-06-11 staged_v2/smart_hold on all three clean windows).
# STATUS: staged ran live 2026-06-09 → 2026-06-10, then reverted; do not re-enable
# without a fresh pre-registered trial that beats legacy on clean data.
exits:
  mode: legacy                      # legacy | staged. Flipped back to legacy 2026-06-10: in the
                                    # broad-universe experiments the staged trail gave back more
                                    # than it earned (PF 0.77 vs 0.89 legacy, 2022-24); the full
                                    # combo (legacy + no-chase + 3-ATR stop) validated on the
                                    # untouched 2025→2026-06 holdout (+0.118R, PF 1.27).
  partial_take_frac: 0.5            # fraction sold at the first (2R) target in staged mode
  move_stop_to: breakeven           # breakeven | none — where the stop goes after the partial
  stagnation_bars: 15               # cut a not-yet-working trade after this many bars
  stagnation_min_r: 1.0             # "working" = up at least this many R
  hard_backstop_bars: 60            # absolute max hold (never carry a position past this)

# Trade budget — the prime directive (mandate §4): ≤ max_entries_per_month NEW entries
# per calendar month as a HARD ceiling (never a quota). Counts EMITTED BUY signals
# (signal_date in the month), so the Telegram report, the paper broker, and the backtest
# all respect the same ceiling. cooldown_days bars a name from re-signaling right after
# a stop-out (noise re-entry burns budget). Enforced in the signal engine; mirrored in
# the backtester so reported cadence is honest.
budget:
  enabled: true
  max_entries_per_month: 7
  cooldown_days: 10            # calendar days after a stop-out before a name may re-signal

# Earnings-date handling (strategy review 2026-06-10 §5 Tier 1). A 3-ATR stop cannot
# contain an overnight earnings gap, so: no new entries within veto_days_before calendar
# days of a confirmed print, and `manage` exits open positions before one. Needs
# SWING_FINNHUB_API_KEY; without it the run proceeds unscreened and warns loudly.
earnings:
  enabled: true
  veto_days_before: 3
  exit_before_earnings: true

# Volatility-scaled sizing (swing_signals/risk/vol_sizing.py). Shrinks size for high-
# volatility names and in high-volatility markets — the one robustly evidenced risk
# technique for momentum (~doubles risk-adjusted return). Only ever reduces size.
sizing:
  vol_scaling_enabled: true
  vol_target_atr_pct: 2.5           # ~2.5%/day ATR earns full size; ~5%/day -> ~half size
  vol_scalar_min: 0.4               # never below 40% of the base size
  vol_scalar_max: 1.0               # never upsize beyond the base

# Liquidity floor (files 01/08/09) — keeps spread/slippage from eating the edge.
universe:
  min_price: 5.0
  min_dollar_volume: 10_000_000     # $10M average daily dollar volume
  top_n_scan: 30                    # universe_screen: cheap-scan survivors handed to full scoring
  max_llm_candidates: 30            # hard cap on names that reach the (costly) Claude news factor
  sp500_only: true                  # tradable universe = point-in-time S&P 500 ONLY (2026-06-12):
                                    # every validated holdout traded S&P 500 members; thematic +
                                    # news-discovered names are unvalidated and would consume the
                                    # ~7/month budget slots — excluded until separately validated

data:
  provider_order: [alpaca, yfinance, tiingo, massive, stooq]
                                    # First that succeeds wins; all but yfinance need keys.
                                    # tiingo: BEHIND the primaries (free tier caps unique
                                    #   symbols/month) but covers many DELISTED tickers — the
                                    #   only free dent in the survivorship residual.
                                    # massive (ex-Polygon): LAST-RESORT live fallback — free
                                    #   tier = 2y window / 5 req/min, and its "adjusted" bars
                                    #   are split-only (no dividend adjustment), so it must
                                    #   never feed long backtest history (the 2y 403 enforces
                                    #   this structurally).
  cache_dir: .cache
  lookback_days: 400                # enough for 200-DMA + ATR warmup
  max_staleness_days: 4             # data older than this → skip the stock (fail-loud)
  max_workers: 8                    # parallel symbol fetches (S&P-500-sized universe scaling)
  index_symbols: [SPY, QQQ, IWM]    # market-context indices (regime/breadth)
  fred_series:                      # macro/vol series pulled from FRED (file 04/07)
    vix: VIXCLS
    vix3m: VXVCLS
    t10y2y: T10Y2Y
    dgs10: DGS10
    hy_oas: BAMLH0A0HYM2

alerts:
  channels: [telegram, email]       # email is the redundant backup
  dry_run_default: false

run:
  output_dir: output
  log_level: INFO
  db_url: "sqlite:///signals.db"   # local default; env DATABASE_URL (Neon) overrides in CI/cloud
  persist: true                    # persist each real run's signals (dry-run never writes)

# Stage 8 — automated Alpaca PAPER trading (opt-in). Disabled by default so the system stays
# signal-only until you add Alpaca keys and flip `enabled: true`. At ~$500 equity positions are
# fractional, so exits are managed by the `manage` job (Alpaca forbids brackets on fractional).
broker:
  enabled: true
  provider: alpaca
  paper: true                      # paper trading only — never a live brokerage account
  entry_class: auto                # auto = native bracket when whole-share, else simple+self-managed
  size_from_live_equity: true      # size off the broker's LIVE equity (tracks the real paper account)
  entry_order_type: limit          # limit at the top of the pullback zone
  entry_price_ref: zone_high       # entry_zone_high (the pullback ceiling)
  tif: day                         # fractional simple orders require DAY (brackets use GTC)
  max_pending_days: 3              # cancel / market-fallback after N sessions unfilled
  market_fallback: true            # market order if the limit never fills
  entry_reprice_each_day: true     # re-place the DAY limit each session until filled/aged (simple)
  place_protective_stops: true     # standalone STOP-DAY (simple/fractional intraday safety net)
  max_hold_bars: 20                # time-stop (trading days), aligned with backtest
  whole_share_only: false          # honor account.fractional_shares (simple path)
  min_order_usd: 1.0               # Alpaca fractional minimum

# Stage 5 backtest parameters (file 11).
# cost_bps: per-side spread+slippage in basis points ($0 commission for US equities).
# max_hold_bars: time-stop — close a position after this many trading days.
# warmup_bars: bars of history required before the first signal (SMA-200 needs ~200).
backtest:
  start: "2022-01-01"
  end: "2024-12-31"
  cost_bps: 10.0
  max_hold_bars: 20
  warmup_bars: 210
  equity_start: 100000.0   # = account.equity, so $ figures are comparable to the live account
