name: CI

# Lint, type-check, and test on every push to main and every PR.
# The test suite is hermetic — pyproject's default `-m 'not network'` deselects
# the live-API tests, so CI never depends on yfinance/FRED/etc. being reachable.
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install (with data + dev + stage-8 extras)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,data,db,broker,ai,postgres,dashboard]"

      - name: Ruff (lint)
        run: ruff check swing_signals tests dashboard

      - name: Mypy (type-check)
        run: mypy swing_signals

      - name: Pytest
        run: pytest -q
