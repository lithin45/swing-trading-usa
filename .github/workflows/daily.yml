name: Daily signals

# Unattended daily run (file 12 §4). Fire generously on weekdays; the in-app NYSE
# calendar gate decides whether today is actually a trading day, so correctness
# doesn't depend on the scheduler's precision or holiday awareness.
on:
  schedule:
    # 21:30 UTC, Mon-Fri ≈ 16:30 ET in winter / 17:30 ET in summer (~1h after close).
    - cron: "30 21 * * 1-5"
  workflow_dispatch: {}  # allow manual runs from the Actions tab

# GitHub disables scheduled workflows after 60 days with no repo activity; a manual
# run or any commit resets that. healthchecks.io (below) is the real dead-man's switch.

# Supply-chain hardening on a public repo:
#  - actions pinned to commit SHAs (mutable tags have been hijacked in the wild);
#  - secrets scoped to the steps that need them, so the unpinned `pip install`
#    runs with NO secrets in its environment (install hooks of a compromised
#    dependency are the common vector). Hash-locked pins would harden the app
#    steps too — tracked as a follow-up.
jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install (no secrets in env)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[data,db,broker,ai,postgres]"

      # 1) Generate + persist signals, send alerts, write the AI brief (if a key is set).
      - name: Generate signals
        env:
          SWING_FRED_API_KEY: ${{ secrets.SWING_FRED_API_KEY }}
          SWING_FINNHUB_API_KEY: ${{ secrets.SWING_FINNHUB_API_KEY }}
          SWING_ALPHAVANTAGE_API_KEY: ${{ secrets.SWING_ALPHAVANTAGE_API_KEY }}
          SWING_SEC_EDGAR_USER_AGENT: ${{ secrets.SWING_SEC_EDGAR_USER_AGENT }}
          SWING_ALPACA_API_KEY: ${{ secrets.SWING_ALPACA_API_KEY }}
          SWING_ALPACA_SECRET_KEY: ${{ secrets.SWING_ALPACA_SECRET_KEY }}
          SWING_ANTHROPIC_API_KEY: ${{ secrets.SWING_ANTHROPIC_API_KEY }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SWING_TELEGRAM_BOT_TOKEN: ${{ secrets.SWING_TELEGRAM_BOT_TOKEN }}
          SWING_TELEGRAM_CHAT_ID: ${{ secrets.SWING_TELEGRAM_CHAT_ID }}
          SWING_SMTP_HOST: ${{ secrets.SWING_SMTP_HOST }}
          SWING_SMTP_PORT: ${{ secrets.SWING_SMTP_PORT }}
          SWING_SMTP_USER: ${{ secrets.SWING_SMTP_USER }}
          SWING_SMTP_PASSWORD: ${{ secrets.SWING_SMTP_PASSWORD }}
          SWING_SMTP_FROM: ${{ secrets.SWING_SMTP_FROM }}
          SWING_SMTP_TO: ${{ secrets.SWING_SMTP_TO }}
          SWING_HEALTHCHECK_URL: ${{ secrets.SWING_HEALTHCHECK_URL }}
        run: swing-signals

      # 2) Submit paper entries for today's signals (no-op unless broker.enabled + Alpaca keys).
      - name: Submit paper entries
        env:
          SWING_ALPACA_API_KEY: ${{ secrets.SWING_ALPACA_API_KEY }}
          SWING_ALPACA_SECRET_KEY: ${{ secrets.SWING_ALPACA_SECRET_KEY }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SWING_HEALTHCHECK_URL: ${{ secrets.SWING_HEALTHCHECK_URL }}
        run: swing-signals trade

      # 3) Reconcile fills, trail stops, exit, snapshot the account. ALWAYS runs —
      # a failed signal/entry step must never leave open positions unmanaged.
      - name: Manage open positions
        if: always()
        env:
          SWING_ALPACA_API_KEY: ${{ secrets.SWING_ALPACA_API_KEY }}
          SWING_ALPACA_SECRET_KEY: ${{ secrets.SWING_ALPACA_SECRET_KEY }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SWING_HEALTHCHECK_URL: ${{ secrets.SWING_HEALTHCHECK_URL }}
        run: swing-signals manage

      # 4) Resolve theoretical signal outcomes (realized R / MAE / MFE) vs fresh prices.
      - name: Update open-signal outcomes
        if: always()
        env:
          SWING_ALPACA_API_KEY: ${{ secrets.SWING_ALPACA_API_KEY }}
          SWING_ALPACA_SECRET_KEY: ${{ secrets.SWING_ALPACA_SECRET_KEY }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SWING_HEALTHCHECK_URL: ${{ secrets.SWING_HEALTHCHECK_URL }}
        run: swing-signals track

      # NOTE: the old "Archive signal DB" artifact step is gone deliberately. Neon
      # (DATABASE_URL) is the system of record; on a public repo a SQLite fallback
      # artifact would expose the full trade history to any logged-in GitHub user.
