name: Earnings backfill

# Chips away at historical earnings report dates (Alpha Vantage EARNINGS, free
# tier ~25 req/day) into data/earnings_dates.csv until the backtest universe is
# covered, then keeps newly-listed names topped up. Budget 15 leaves headroom
# for the daily run's Alpha Vantage news calls on the same key. Scheduled far
# from the 21:30 UTC daily run so the two never race the quota window.
#
# Commits the updated CSVs straight back to main: they are public facts
# (report dates), append-only, and versioning them is what makes backtests
# reproducible from a fresh clone.

on:
  schedule:
    - cron: "15 9 * * *"   # 09:15 UTC daily
  workflow_dispatch: {}

concurrency:
  group: earnings-backfill
  cancel-in-progress: false

permissions:
  contents: write  # the commit-back step; no other workflow needs write

jobs:
  backfill:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: main

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install (no secrets in env)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[data]"

      - name: Backfill earnings dates
        env:
          SWING_ALPHAVANTAGE_API_KEY: ${{ secrets.SWING_ALPHAVANTAGE_API_KEY }}
        run: python scripts/backfill_earnings.py --budget 15

      - name: Commit table updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/earnings_dates.csv data/earnings_backfill_state.csv
          git diff --cached --quiet && echo "no new rows" && exit 0
          git commit -m "Earnings backfill: $(date -u +%F) batch"
          git push
